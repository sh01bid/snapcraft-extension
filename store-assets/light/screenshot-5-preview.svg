<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6A800"/>
      <stop offset="100%" style="stop-color:#B38200"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA"/>
      <stop offset="100%" style="stop-color:#E9ECEF"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E6A800"/>
      <stop offset="100%" style="stop-color:#B38200"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bgGrad)"/>
  
  <g transform="translate(80, 30)">
    <rect x="0" y="0" width="1120" height="740" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="1120" height="64" rx="12" fill="#F1F3F5"/>
    <rect x="0" y="48" width="1120" height="16" fill="#F1F3F5"/>
    <text x="24" y="28" fill="#111111" font-family="Inter, sans-serif" font-size="16">🎬</text>
    <text x="52" y="38" fill="#111111" font-family="Inter, sans-serif" font-size="16" font-weight="700">Recording Preview</text>
    
    <!-- Duration & Size -->
    <text x="240" y="36" fill="#666666" font-family="Inter, sans-serif" font-size="12">⏱ 1m 23s</text>
    <text x="320" y="36" fill="#666666" font-family="Inter, sans-serif" font-size="12">📦 4.2 MB</text>
    
    <!-- Format select -->
    <rect x="780" y="16" width="120" height="32" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <text x="800" y="37" fill="#B38200" font-family="Inter, sans-serif" font-size="12" font-weight="600">MP4 (H.264) ▾</text>
    
    <!-- Download button with progress -->
    <rect x="910" y="16" width="130" height="32" rx="8" fill="url(#btnGrad)"/>
    <text x="940" y="37" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">Converting: 67%</text>
    
    <!-- Delete -->
    <rect x="1050" y="16" width="52" height="32" rx="8" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1"/>
    <text x="1060" y="37" fill="#EF4444" font-family="Inter, sans-serif" font-size="12">🗑️</text>

    <!-- Progress bar -->
    <rect x="0" y="64" width="1120" height="3" fill="#F1F3F5"/>
    <rect x="0" y="64" width="750" height="3" fill="url(#btnGrad)"/>
    
    <!-- Video player area -->
    <rect x="40" y="90" width="1040" height="585" rx="8" fill="#0a0a1a"/>
    
    <!-- Mock video content -->
    <rect x="80" y="120" width="960" height="500" rx="4" fill="#111128"/>
    <rect x="120" y="150" width="400" height="30" rx="4" fill="#666666" opacity="0.1"/>
    <rect x="120" y="200" width="880" height="16" rx="3" fill="#666666" opacity="0.08"/>
    <rect x="120" y="230" width="700" height="16" rx="3" fill="#666666" opacity="0.06"/>
    <rect x="120" y="260" width="800" height="16" rx="3" fill="#666666" opacity="0.08"/>
    <rect x="120" y="320" width="400" height="250" rx="8" fill="#F1F3F5" opacity="0.5"/>
    <rect x="560" y="320" width="440" height="250" rx="8" fill="#F1F3F5" opacity="0.3"/>
    
    <!-- Play button overlay -->
    <circle cx="560" cy="400" r="40" fill="rgba(0,0,0,0.5)"/>
    <polygon points="548,380 548,420 580,400" fill="white"/>
    
    <!-- Video controls bar -->
    <rect x="40" y="640" width="1040" height="35" rx="0" fill="rgba(0,0,0,0.6)"/>
    <text x="60" y="663" fill="white" font-family="Inter, monospace" font-size="11">0:45 / 1:23</text>
    <rect x="170" y="654" width="800" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="170" y="654" width="420" height="4" rx="2" fill="#B38200"/>
    <circle cx="590" cy="656" r="6" fill="white"/>
  </g>
  
  <text x="640" y="790" fill="#666666" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Preview recordings and export as WebM or MP4 with real-time conversion progress</text>
</svg>