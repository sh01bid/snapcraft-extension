<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6A800"/>
      <stop offset="100%" style="stop-color:#B38200"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA"/>
      <stop offset="100%" style="stop-color:#E9ECEF"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E6A800"/>
      <stop offset="100%" style="stop-color:#B38200"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bgGrad)"/>
  
  <!-- Background glow -->
  <circle cx="220" cy="140" r="250" fill="#E6A800" opacity="0.06"/>
  <circle cx="380" cy="220" r="180" fill="#B38200" opacity="0.05"/>
  
  <!-- Icon -->
  
    <rect x="30" y="50" width="80" height="80" rx="17.6" fill="#F8F9FA"/>
    <g transform="translate(70, 90)">
      <!-- Left Screen -->
      <g transform="translate(-17.6, 6.4) rotate(-25)">
        <rect x="-12" y="-20" width="24" height="40" rx="4.8" fill="none" stroke="url(#iconGrad)" stroke-width="3.2"/>
      </g>
      <!-- Right Screen -->
      <g transform="translate(17.6, 6.4) rotate(25)">
        <rect x="-12" y="-20" width="24" height="40" rx="4.8" fill="none" stroke="url(#iconGrad)" stroke-width="3.2"/>
      </g>
      <!-- Center Screen (Top peak) -->
      <g transform="translate(0, -4)">
        <rect x="-14.399999999999999" y="-24" width="28.799999999999997" height="48" rx="6.4" fill="url(#iconGrad)" opacity="0.9"/>
      </g>
    </g>
  
  
  <!-- Title - LARGE -->
  <text x="130" y="100" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800">ScreenKing</text>
  
  <!-- Subtitle -->
  <text x="130" y="140" fill="#666666" font-family="Inter, Arial, sans-serif" font-size="22">Screenshot &amp; Recorder</text>
  
  <!-- Feature tags - big and bold -->
  <rect x="30" y="180" width="120" height="40" rx="20" fill="#E6A800" opacity="0.2" stroke="#E6A800" stroke-width="2"/>
  <text x="90" y="206" fill="#E6A800" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Capture</text>
  
  <rect x="165" y="180" width="110" height="40" rx="20" fill="#B38200" opacity="0.2" stroke="#B38200" stroke-width="2"/>
  <text x="220" y="206" fill="#B38200" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Record</text>
  
  <rect x="290" y="180" width="120" height="40" rx="20" fill="#CC9500" opacity="0.2" stroke="#CC9500" stroke-width="2"/>
  <text x="350" y="206" fill="#CC9500" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Annotate</text>
  
  <!-- Tagline -->
  <text x="220" y="256" fill="#666666" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">All-in-One · Free · Open Source</text>
</svg>