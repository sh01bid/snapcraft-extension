<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6A800"/>
      <stop offset="100%" style="stop-color:#B38200"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA"/>
      <stop offset="100%" style="stop-color:#E9ECEF"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E6A800"/>
      <stop offset="100%" style="stop-color:#B38200"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bgGrad)"/>
  
  <g transform="translate(240, 30)">
    <rect x="0" y="0" width="800" height="740" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="800" height="64" rx="12" fill="#F1F3F5"/>
    <rect x="0" y="48" width="800" height="16" fill="#F1F3F5"/>
    
    <rect x="20" y="12" width="40" height="40" rx="8.8" fill="#F8F9FA"/>
    <g transform="translate(40, 32)">
      <!-- Left Screen -->
      <g transform="translate(-8.8, 3.2) rotate(-25)">
        <rect x="-6" y="-10" width="12" height="20" rx="2.4" fill="none" stroke="url(#iconGrad)" stroke-width="1.6"/>
      </g>
      <!-- Right Screen -->
      <g transform="translate(8.8, 3.2) rotate(25)">
        <rect x="-6" y="-10" width="12" height="20" rx="2.4" fill="none" stroke="url(#iconGrad)" stroke-width="1.6"/>
      </g>
      <!-- Center Screen (Top peak) -->
      <g transform="translate(0, -2)">
        <rect x="-7.199999999999999" y="-12" width="14.399999999999999" height="24" rx="3.2" fill="url(#iconGrad)" opacity="0.9"/>
      </g>
    </g>
  
    <text x="72" y="40" fill="#111111" font-family="Inter, sans-serif" font-size="18" font-weight="700">Settings</text>
    <text x="148" y="40" fill="#666666" font-family="Inter, sans-serif" font-size="12">v3.0.1</text>
    
    <!-- Screenshot section -->
    <rect x="20" y="80" width="760" height="40" rx="8" fill="#F1F3F5"/>
    <text x="56" y="106" fill="#111111" font-family="Inter, sans-serif" font-size="14" font-weight="600">📷 Screenshot</text>
    
    <!-- Image Format -->
    <rect x="20" y="128" width="760" height="56" rx="0" fill="transparent"/>
    <text x="40" y="154" fill="#111111" font-family="Inter, sans-serif" font-size="13">Image Format</text>
    <text x="40" y="172" fill="#666666" font-family="Inter, sans-serif" font-size="11">Default format for saved screenshots</text>
    <rect x="620" y="138" width="140" height="32" rx="6" fill="#F1F3F5" stroke="#E5E5E5" stroke-width="1"/>
    <text x="660" y="159" fill="#111111" font-family="Inter, sans-serif" font-size="12">PNG ▾</text>
    
    <!-- Quality -->
    <rect x="20" y="192" width="760" height="56" rx="0" fill="transparent"/>
    <text x="40" y="218" fill="#111111" font-family="Inter, sans-serif" font-size="13">Image Quality</text>
    <text x="40" y="236" fill="#666666" font-family="Inter, sans-serif" font-size="11">For JPEG and WebP formats (1-100)</text>
    <rect x="580" y="210" width="160" height="8" rx="4" fill="#F1F3F5"/>
    <rect x="580" y="210" width="128" height="8" rx="4" fill="url(#btnGrad)"/>
    <circle cx="708" cy="214" r="8" fill="white"/>
    <text x="750" y="218" fill="#111111" font-family="Inter, sans-serif" font-size="12">92</text>
    
    <!-- Auto Copy -->
    <rect x="20" y="256" width="760" height="56" rx="0" fill="transparent"/>
    <text x="40" y="282" fill="#111111" font-family="Inter, sans-serif" font-size="13">Auto Copy to Clipboard</text>
    <text x="40" y="300" fill="#666666" font-family="Inter, sans-serif" font-size="11">Automatically copy screenshots to clipboard</text>
    <rect x="716" y="274" width="44" height="24" rx="12" fill="#E6A800"/>
    <circle cx="746" cy="286" r="9" fill="white"/>
    
    <!-- Recording section -->
    <rect x="20" y="328" width="760" height="40" rx="8" fill="#F1F3F5"/>
    <text x="56" y="354" fill="#111111" font-family="Inter, sans-serif" font-size="14" font-weight="600">🎬 Recording</text>
    
    <!-- Video Format -->
    <rect x="20" y="376" width="760" height="56" rx="0" fill="transparent"/>
    <text x="40" y="402" fill="#111111" font-family="Inter, sans-serif" font-size="13">Video Format</text>
    <text x="40" y="420" fill="#666666" font-family="Inter, sans-serif" font-size="11">WebM (native) or MP4 (converted)</text>
    <rect x="620" y="386" width="140" height="32" rx="6" fill="#F1F3F5" stroke="#E5E5E5" stroke-width="1"/>
    <text x="640" y="407" fill="#111111" font-family="Inter, sans-serif" font-size="12">WebM (VP9) ▾</text>
    
    <!-- FPS -->
    <rect x="20" y="440" width="760" height="56" rx="0" fill="transparent"/>
    <text x="40" y="466" fill="#111111" font-family="Inter, sans-serif" font-size="13">Frame Rate</text>
    <text x="40" y="484" fill="#666666" font-family="Inter, sans-serif" font-size="11">Frames per second</text>
    <rect x="620" y="450" width="140" height="32" rx="6" fill="#F1F3F5" stroke="#E5E5E5" stroke-width="1"/>
    <text x="670" y="471" fill="#111111" font-family="Inter, sans-serif" font-size="12">30 FPS ▾</text>
    
    <!-- General section -->
    <rect x="20" y="520" width="760" height="40" rx="8" fill="#F1F3F5"/>
    <text x="56" y="546" fill="#111111" font-family="Inter, sans-serif" font-size="14" font-weight="600">⚙ General</text>
    
    <!-- Theme -->
    <rect x="20" y="568" width="760" height="56" rx="0" fill="transparent"/>
    <text x="40" y="594" fill="#111111" font-family="Inter, sans-serif" font-size="13">Theme</text>
    <text x="40" y="612" fill="#666666" font-family="Inter, sans-serif" font-size="11">Visual appearance</text>
    <rect x="620" y="578" width="140" height="32" rx="6" fill="#F1F3F5" stroke="#E5E5E5" stroke-width="1"/>
    <text x="665" y="599" fill="#111111" font-family="Inter, sans-serif" font-size="12">Dark ▾</text>
    
    <!-- Notifications -->
    <rect x="20" y="632" width="760" height="56" rx="0" fill="transparent"/>
    <text x="40" y="658" fill="#111111" font-family="Inter, sans-serif" font-size="13">Notifications</text>
    <text x="40" y="676" fill="#666666" font-family="Inter, sans-serif" font-size="11">Show desktop notifications after capture</text>
    <rect x="716" y="650" width="44" height="24" rx="12" fill="#E6A800"/>
    <circle cx="746" cy="662" r="9" fill="white"/>
  </g>
  
  <text x="640" y="790" fill="#666666" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Customizable settings for screenshots, recordings, and general preferences</text>
</svg>