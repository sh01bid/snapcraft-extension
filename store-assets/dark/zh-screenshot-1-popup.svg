  </defs>
  <rect width="1280" height="800" fill="url(#bgGrad)"/>
  <circle cx="200" cy="600" r="300" fill="#FCEABB" opacity="0.03"/>
  <circle cx="1100" cy="200" r="250" fill="#F8B500" opacity="0.03"/>
  <g transform="translate(390, 60)">
