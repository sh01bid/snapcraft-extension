<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0C14"/>
      <stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bgGrad)"/>
  
  <!-- Background decoration -->
  <circle cx="200" cy="600" r="300" fill="#6C63FF" opacity="0.03"/>
  <circle cx="1100" cy="200" r="250" fill="#00D4FF" opacity="0.03"/>
  
  <!-- Centered popup mockup -->
  <g transform="translate(390, 60)">
    <!-- Popup frame -->
    <rect x="0" y="0" width="500" height="680" rx="16" fill="#141420" stroke="#2A2A40" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="500" height="70" rx="16" fill="#1C1C2E"/>
    <rect x="0" y="50" width="500" height="20" fill="#1C1C2E"/>
    
    <rect x="20" y="15" width="40" height="40" rx="8" fill="#0C0C14"/>
    <circle cx="40" cy="35" r="9.200000000000001" fill="none" stroke="url(#iconGrad)" stroke-width="2.2"/>
    <circle cx="40" cy="35" r="4" fill="url(#iconGrad)" opacity="0.8"/>
    <line x1="27.2" y1="22.2" x2="32" y2="22.2" stroke="url(#iconGrad)" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="27.2" y1="22.2" x2="27.2" y2="27" stroke="url(#iconGrad)" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="52.8" y1="22.2" x2="48" y2="22.2" stroke="url(#iconGrad)" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="52.8" y1="22.2" x2="52.8" y2="27" stroke="url(#iconGrad)" stroke-width="1.6" stroke-linecap="round"/>
  
    <text x="72" y="42" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="18" font-weight="700">ScreenKing</text>
    <text x="178" y="42" fill="#8888AA" font-family="Inter, sans-serif" font-size="12">v3.0.1</text>
    
    <!-- Settings gear -->
    <circle cx="440" cy="35" r="16" fill="#141420" stroke="#2A2A40" stroke-width="1"/>
    <text x="435" y="40" fill="#8888AA" font-family="Inter, sans-serif" font-size="14">⚙</text>
    
    <!-- History icon -->
    <circle cx="472" cy="35" r="16" fill="#141420" stroke="#2A2A40" stroke-width="1"/>
    <text x="467" y="40" fill="#8888AA" font-family="Inter, sans-serif" font-size="14">📋</text>
    
    <!-- Screenshot Section -->
    <text x="24" y="104" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="14" font-weight="600">📷 Screenshot</text>
    
    <!-- Capture Visible -->
    <rect x="16" y="118" width="468" height="52" rx="10" fill="#1C1C2E" stroke="#2A2A40" stroke-width="1"/>
    <text x="52" y="150" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="13">Capture Visible Area</text>
    <rect x="350" y="132" width="120" height="24" rx="6" fill="#0C0C14" stroke="#2A2A40" stroke-width="1"/>
    <text x="368" y="149" fill="#8888AA" font-family="Inter, monospace" font-size="11">Alt+Shift+V</text>
    
    <!-- Full Page -->
    <rect x="16" y="178" width="468" height="52" rx="10" fill="#1C1C2E" stroke="#2A2A40" stroke-width="1"/>
    <text x="52" y="210" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="13">Capture Full Page</text>
    <rect x="350" y="192" width="120" height="24" rx="6" fill="#0C0C14" stroke="#2A2A40" stroke-width="1"/>
    <text x="368" y="209" fill="#8888AA" font-family="Inter, monospace" font-size="11">Alt+Shift+F</text>
    
    <!-- Select Region -->
    <rect x="16" y="238" width="468" height="52" rx="10" fill="#1C1C2E" stroke="#2A2A40" stroke-width="1"/>
    <text x="52" y="270" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="13">Select Region</text>
    <rect x="350" y="252" width="120" height="24" rx="6" fill="#0C0C14" stroke="#2A2A40" stroke-width="1"/>
    <text x="368" y="269" fill="#8888AA" font-family="Inter, monospace" font-size="11">Alt+Shift+S</text>

    <!-- Recording Section -->
    <text x="24" y="326" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="14" font-weight="600">🎬 Recording</text>
    
    <!-- Record Tab -->
    <rect x="16" y="340" width="468" height="52" rx="10" fill="#1C1C2E" stroke="#2A2A40" stroke-width="1"/>
    <text x="52" y="372" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="13">Record Current Tab</text>
    
    <!-- Record Desktop -->
    <rect x="16" y="400" width="468" height="52" rx="10" fill="#1C1C2E" stroke="#2A2A40" stroke-width="1"/>
    <text x="52" y="432" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="13">Record Desktop</text>

    <!-- Sharing Section -->
    <text x="24" y="490" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="14" font-weight="600">🔗 Sharing</text>
    
    <rect x="16" y="504" width="468" height="52" rx="10" fill="#1C1C2E" stroke="#2A2A40" stroke-width="1"/>
    <text x="52" y="536" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="13">Share to Web</text>
    
    <!-- Toggle -->
    <rect x="16" y="570" width="468" height="52" rx="10" fill="#1C1C2E" stroke="#2A2A40" stroke-width="1"/>
    <text x="52" y="602" fill="#E8E8F0" font-family="Inter, sans-serif" font-size="13">Auto Copy to Clipboard</text>
    <rect x="424" y="586" width="44" height="24" rx="12" fill="#6C63FF"/>
    <circle cx="454" cy="598" r="9" fill="white"/>
  </g>
  
  <!-- Title text -->
  <text x="640" y="775" fill="#8888AA" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Clean, intuitive popup for quick access to all capture modes</text>
</svg>