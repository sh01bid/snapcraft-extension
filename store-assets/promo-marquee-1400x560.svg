<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCEABB"/>
      <stop offset="100%" style="stop-color:#F8B500"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCEABB"/>
      <stop offset="100%" style="stop-color:#F8B500"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="560" fill="url(#bgGrad)"/>
  
  <!-- Background glow -->
  <circle cx="450" cy="280" r="400" fill="#FCEABB" opacity="0.05"/>
  <circle cx="1050" cy="280" r="350" fill="#F8B500" opacity="0.05"/>
  
  <!-- Left side: Branding -->
  <g transform="translate(80, 60)">
    
    <rect x="0" y="10" width="100" height="100" rx="22" fill="#0A0A0A"/>
    <g transform="translate(50, 60)">
      <!-- Left Screen -->
      <g transform="translate(-22, 8) rotate(-25)">
        <rect x="-15" y="-25" width="30" height="50" rx="6" fill="none" stroke="url(#iconGrad)" stroke-width="4"/>
      </g>
      <!-- Right Screen -->
      <g transform="translate(22, 8) rotate(25)">
        <rect x="-15" y="-25" width="30" height="50" rx="6" fill="none" stroke="url(#iconGrad)" stroke-width="4"/>
      </g>
      <!-- Center Screen (Top peak) -->
      <g transform="translate(0, -5)">
        <rect x="-18" y="-30" width="36" height="60" rx="8" fill="url(#iconGrad)" opacity="0.9"/>
      </g>
    </g>
  
    
    <text x="120" y="80" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">ScreenKing</text>
    
    <text x="0" y="150" fill="#A0A0A0" font-family="Inter, Arial, sans-serif" font-size="32">Screenshot &amp; Screen Recorder</text>
    <text x="0" y="195" fill="#A0A0A0" font-family="Inter, Arial, sans-serif" font-size="32">with Built-in Editor</text>
    
    <!-- Feature list - large text -->
    <text x="0" y="270" fill="#F8B500" font-family="Inter, Arial, sans-serif" font-size="26">✦</text>
    <text x="36" y="270" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="26">Full page, visible area &amp; region capture</text>
    
    <text x="0" y="310" fill="#F8B500" font-family="Inter, Arial, sans-serif" font-size="26">✦</text>
    <text x="36" y="310" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="26">Tab &amp; desktop screen recording</text>
    
    <text x="0" y="350" fill="#F8B500" font-family="Inter, Arial, sans-serif" font-size="26">✦</text>
    <text x="36" y="350" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="26">Export as PNG, JPEG, WebP, MP4</text>

    <!-- CTA button -->
    <rect x="0" y="390" width="280" height="64" rx="32" fill="url(#btnGrad)"/>
    <text x="140" y="430" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">Add to Chrome</text>
    
    <text x="310" y="430" fill="#A0A0A0" font-family="Inter, Arial, sans-serif" font-size="22">Free &amp; Open Source</text>
  </g>
  
  <!-- Right side: Simplified popup mockup -->
  <g transform="translate(900, 40)">
    <rect x="0" y="0" width="440" height="480" rx="20" fill="#141414" stroke="#2A2A2A" stroke-width="2" opacity="0.9"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="440" height="64" rx="20" fill="#1C1C1C"/>
    <rect x="0" y="44" width="440" height="20" fill="#1C1C1C"/>
    
    <rect x="16" y="12" width="40" height="40" rx="8.8" fill="#0A0A0A"/>
    <g transform="translate(36, 32)">
      <!-- Left Screen -->
      <g transform="translate(-8.8, 3.2) rotate(-25)">
        <rect x="-6" y="-10" width="12" height="20" rx="2.4" fill="none" stroke="url(#iconGrad)" stroke-width="1.6"/>
      </g>
      <!-- Right Screen -->
      <g transform="translate(8.8, 3.2) rotate(25)">
        <rect x="-6" y="-10" width="12" height="20" rx="2.4" fill="none" stroke="url(#iconGrad)" stroke-width="1.6"/>
      </g>
      <!-- Center Screen (Top peak) -->
      <g transform="translate(0, -2)">
        <rect x="-7.199999999999999" y="-12" width="14.399999999999999" height="24" rx="3.2" fill="url(#iconGrad)" opacity="0.9"/>
      </g>
    </g>
  
    <text x="68" y="42" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">ScreenKing</text>
    
    <!-- Menu items - bigger -->
    <rect x="16" y="80" width="408" height="54" rx="10" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="48" y="114" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="18">📷 Capture Visible</text>
    
    <rect x="16" y="142" width="408" height="54" rx="10" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="48" y="176" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="18">📄 Full Page</text>
    
    <rect x="16" y="204" width="408" height="54" rx="10" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="48" y="238" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="18">✂️ Select Region</text>
    
    <text x="28" y="290" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">🎬 Recording</text>
    
    <rect x="16" y="304" width="408" height="54" rx="10" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="48" y="338" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="18">🖥️ Record Tab</text>
    
    <rect x="16" y="366" width="408" height="54" rx="10" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="48" y="400" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="18">💻 Record Desktop</text>
    
    <!-- Toggle -->
    <rect x="16" y="434" width="408" height="40" rx="10" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>
    <text x="48" y="460" fill="#F5F5F5" font-family="Inter, Arial, sans-serif" font-size="16">📋 Auto Copy</text>
    <rect x="370" y="444" width="40" height="22" rx="11" fill="#FCEABB"/>
    <circle cx="398" cy="455" r="8" fill="white"/>
  </g>
</svg>