<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0C14"/>
      <stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bgGrad)"/>
  
  <!-- Background glow -->
  <circle cx="220" cy="140" r="250" fill="#6C63FF" opacity="0.06"/>
  <circle cx="380" cy="220" r="180" fill="#00D4FF" opacity="0.05"/>
  
  <!-- Icon -->
  
    <rect x="30" y="50" width="80" height="80" rx="16" fill="#0C0C14"/>
    <circle cx="70" cy="90" r="18.400000000000002" fill="none" stroke="url(#iconGrad)" stroke-width="4.4"/>
    <circle cx="70" cy="90" r="8" fill="url(#iconGrad)" opacity="0.8"/>
    <line x1="44.4" y1="64.4" x2="54" y2="64.4" stroke="url(#iconGrad)" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="44.4" y1="64.4" x2="44.4" y2="74" stroke="url(#iconGrad)" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="95.6" y1="64.4" x2="86" y2="64.4" stroke="url(#iconGrad)" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="95.6" y1="64.4" x2="95.6" y2="74" stroke="url(#iconGrad)" stroke-width="3.2" stroke-linecap="round"/>
  
  
  <!-- Title - LARGE -->
  <text x="130" y="100" fill="#E8E8F0" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800">SnapCraft</text>
  
  <!-- Subtitle -->
  <text x="130" y="140" fill="#8888AA" font-family="Inter, Arial, sans-serif" font-size="22">Screenshot &amp; Recorder</text>
  
  <!-- Feature tags - big and bold -->
  <rect x="30" y="180" width="120" height="40" rx="20" fill="#6C63FF" opacity="0.2" stroke="#6C63FF" stroke-width="2"/>
  <text x="90" y="206" fill="#6C63FF" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Capture</text>
  
  <rect x="165" y="180" width="110" height="40" rx="20" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="2"/>
  <text x="220" y="206" fill="#00D4FF" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Record</text>
  
  <rect x="290" y="180" width="120" height="40" rx="20" fill="#22C55E" opacity="0.2" stroke="#22C55E" stroke-width="2"/>
  <text x="350" y="206" fill="#22C55E" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Annotate</text>
  
  <!-- Tagline -->
  <text x="220" y="256" fill="#8888AA" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">All-in-One · Free · Open Source</text>
